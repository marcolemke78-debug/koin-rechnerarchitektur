<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- AND-Gatter: Rechteck mit "&" -->
  <symbol id="gate-and" viewBox="0 0 80 60">
    <line x1="0" y1="18" x2="15" y2="18" stroke="black" stroke-width="2"/>
    <line x1="0" y1="42" x2="15" y2="42" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">&amp;</text>
    <line x1="55" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

  <!-- OR-Gatter: Rechteck mit "≥1" -->
  <symbol id="gate-or" viewBox="0 0 80 60">
    <line x1="0" y1="18" x2="15" y2="18" stroke="black" stroke-width="2"/>
    <line x1="0" y1="42" x2="15" y2="42" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">≥1</text>
    <line x1="55" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

  <!-- NOT-Gatter: Rechteck mit "1", 1 Eingang, Negationskreis am Ausgang -->
  <symbol id="gate-not" viewBox="0 0 80 60">
    <line x1="0" y1="30" x2="15" y2="30" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">1</text>
    <circle cx="59" cy="30" r="4" fill="white" stroke="black" stroke-width="2"/>
    <line x1="63" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

  <!-- XOR-Gatter: Rechteck mit "=1" -->
  <symbol id="gate-xor" viewBox="0 0 80 60">
    <line x1="0" y1="18" x2="15" y2="18" stroke="black" stroke-width="2"/>
    <line x1="0" y1="42" x2="15" y2="42" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">=1</text>
    <line x1="55" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

  <!-- NAND-Gatter: Rechteck mit "&", Negationskreis am Ausgang -->
  <symbol id="gate-nand" viewBox="0 0 80 60">
    <line x1="0" y1="18" x2="15" y2="18" stroke="black" stroke-width="2"/>
    <line x1="0" y1="42" x2="15" y2="42" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">&amp;</text>
    <circle cx="59" cy="30" r="4" fill="white" stroke="black" stroke-width="2"/>
    <line x1="63" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

  <!-- NOR-Gatter: Rechteck mit "≥1", Negationskreis am Ausgang -->
  <symbol id="gate-nor" viewBox="0 0 80 60">
    <line x1="0" y1="18" x2="15" y2="18" stroke="black" stroke-width="2"/>
    <line x1="0" y1="42" x2="15" y2="42" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">≥1</text>
    <circle cx="59" cy="30" r="4" fill="white" stroke="black" stroke-width="2"/>
    <line x1="63" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

  <!-- XNOR-Gatter: Rechteck mit "=1", Negationskreis am Ausgang -->
  <symbol id="gate-xnor" viewBox="0 0 80 60">
    <line x1="0" y1="18" x2="15" y2="18" stroke="black" stroke-width="2"/>
    <line x1="0" y1="42" x2="15" y2="42" stroke="black" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="50" fill="white" stroke="black" stroke-width="2"/>
    <text x="35" y="35" text-anchor="middle" font-size="14" font-weight="bold">=1</text>
    <circle cx="59" cy="30" r="4" fill="white" stroke="black" stroke-width="2"/>
    <line x1="63" y1="30" x2="80" y2="30" stroke="black" stroke-width="2"/>
  </symbol>

</svg>
